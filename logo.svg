<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pageGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Book Icon -->
  <g transform="translate(10, 10)">
    <!-- Book Shadow -->
    <rect x="2" y="2" width="36" height="40" rx="3" fill="#000000" opacity="0.2"/>
    
    <!-- Book Cover -->
    <rect x="0" y="0" width="36" height="40" rx="3" fill="url(#logoGradient)"/>
    
    <!-- Book Spine -->
    <rect x="0" y="0" width="6" height="40" rx="2" fill="#15803d" opacity="0.5"/>
    
    <!-- Pages -->
    <rect x="6" y="2" width="24" height="32" rx="2" fill="url(#pageGradient)"/>
    
    <!-- Page Lines -->
    <line x1="10" y1="8" x2="26" y2="8" stroke="#94a3b8" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="14" x2="26" y2="14" stroke="#94a3b8" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="20" x2="22" y2="20" stroke="#94a3b8" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="26" x2="24" y2="26" stroke="#94a3b8" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Bookmark -->
    <rect x="30" y="0" width="5" height="20" fill="#ef4444" opacity="0.9"/>
    <path d="M30 20 L32.5 17 L35 20 Z" fill="#ef4444" opacity="0.9"/>
  </g>
  
  <!-- Text -->
  <text x="60" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#22c55e">Ebook</text>
  <text x="60" y="42" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#16a34a">Library</text>
</svg>
