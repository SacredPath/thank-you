<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pageGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Book Shadow -->
  <rect x="6" y="8" width="18" height="20" rx="2" fill="#000000" opacity="0.2" transform="translate(1, 1)"/>
  
  <!-- Book Cover -->
  <rect x="6" y="6" width="18" height="20" rx="2" fill="url(#bookGradient)"/>
  
  <!-- Book Spine -->
  <rect x="6" y="6" width="3" height="20" rx="1" fill="#15803d" opacity="0.5"/>
  
  <!-- Pages -->
  <rect x="9" y="8" width="12" height="16" rx="1" fill="url(#pageGradient)"/>
  
  <!-- Page Lines -->
  <line x1="11" y1="11" x2="19" y2="11" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <line x1="11" y1="14" x2="19" y2="14" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <line x1="11" y1="17" x2="17" y2="17" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <line x1="11" y1="20" x2="18" y2="20" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  
  <!-- Bookmark -->
  <rect x="20" y="6" width="3" height="12" fill="#ef4444" opacity="0.9"/>
  <path d="M20 18 L21.5 16 L23 18 Z" fill="#ef4444" opacity="0.9"/>
</svg>
