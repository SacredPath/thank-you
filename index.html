<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You! Your Ebook Library Awaits</title>

<meta name="description" content="Thank you for your purchase! Explore our full collection of ebooks for self-improvement, productivity, health, and wealth.">

<!-- Favicon -->
<link rel="icon" type="image/png" href="https://files.selar.co/product-images/2026/products/macson-mark1/micro-habits-for-anxiety-selar.com-698e3da310e9b.jpeg">

<style>
body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
  margin:0;
  text-align:center;
}
header{
  padding:60px 20px;
}
h1{
  font-size:36px;
  margin-bottom:10px;
}
p{
  color:#cbd5e1;
  font-size:18px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:25px;
  padding:40px;
  max-width:1200px;
  margin:auto;
}
.book{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  transition:0.3s;
}
.book:hover{
  transform:translateY(-5px);
}
.book img{
  width:100%;
  border-radius:8px;
}
.book-title{
  margin-top:8px;
  font-size:14px;
  font-weight:bold;
}
.book a{
  display:inline-block;
  margin-top:8px;
  padding:8px 15px;
  background:#22c55e;
  color:white;
  text-decoration:none;
  border-radius:6px;
  font-weight:bold;
  font-size:14px;
}
.book a:hover{
  background:#16a34a;
}
footer{
  margin:60px 0;
  color:#94a3b8;
  font-size:14px;
}
</style>
</head>
<body>

<header>
<h1>🎉 Thank You For Your Purchase!</h1>
<p>You now have access to your ebook. While you wait for your download link, explore our full collection of 15 ebooks below.</p>
</header>

<div class="grid" id="books"></div>

<footer>
<p>More knowledge. More income. More freedom.</p>
</footer>

<script>

  { url: "https://selar.com/25q9751553", img: "https://files.selar.co/product-images/2026/products/macson-mark1/micro-habits-for-anxiety-selar.com-698e3da310e9b.jpeg", title: "Micro Habits for Anxiety" },
  { url: "https://selar.com/s791c09q38", img: "https://files.selar.co/product-images/2026/products/macson-mark1/micro-habits-for-tough-da-selar.com-698e40477adc0.png", title: "Micro Habits for Tough Days" },
  { url: "https://selar.com/987ofco0w7", img: "https://files.selar.co/product-images/2026/products/macson-mark1/micro-habits-for-confiden-selar.com-698e425529f38.png", title: "Micro Habits for Confidence" },
  { url: "https://selar.com/7l12r21lda", img: "https://files.selar.co/product-images/2026/products/macson-mark1/micro-habit-for-focus-selar.com-698e47df737c2.png", title: "Micro Habits for Focus" },
  { url: "https://selar.com/33uey731n3", img: "https://files.selar.co/product-images/2026/products/macson-mark1/micro-habits-for-sleep-selar.com-698e4ea1ca204.jpeg", title: "Micro Habits for Sleep" },

  { url: "https://selar.com/3p6302t731", img: "https://files.selar.co/product-images/2026/products/macson-mark1/laptop-money-how-to-start-selar.com-69a95ba3b61bd.png", title: "Laptop Money: How to Start" },

const container = document.getElementById("books");
books.forEach(book=>{
  const card = document.createElement("div");
  card.className = "book";
  card.innerHTML = `
    <img src="${book.img}" alt="${book.title}">
    <div class="book-title">${book.title}</div>
    <a href="${book.url}" target="_blank">View Book</a>

  container.appendChild(card);
});
</script>

</body>
</html>
