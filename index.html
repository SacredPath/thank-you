<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Ebook Library</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

header{
padding:50px 20px;
}

h1{
font-size:38px;
}

p{
color:#cbd5e1;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
max-width:1200px;
margin:auto;
}

.book{
background:#1e293b;
padding:18px;
border-radius:10px;
}

.book img{
width:100%;
border-radius:8px;
}

.book a{
display:inline-block;
margin-top:12px;
padding:10px 18px;
background:#22c55e;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:bold;
}

.book a:hover{
background:#16a34a;
}

</style>

</head>

<body>

<header>
<h1>✅ Your Book Is Ready</h1>
<p>Explore more books readers love.</p>
</header>

<div class="grid" id="books"></div>

<script>

const books = [

"https://selar.com/25q9751553",
"https://selar.com/s791c09q38",
"https://selar.com/987ofco0w7",
"https://selar.com/7l12r21lda",
"https://selar.com/33uey731n3",
"https://selar.com/gh6v67n7f7",
"https://selar.com/3p6302t731",
"https://selar.com/2178r40742",
"https://selar.com/e2d205z359",
"https://selar.com/11720pg206",
"https://selar.com/737mseu4fl",
"https://selar.com/2772q1la67",
"https://selar.com/338i7s607u",
"https://selar.com/7n24n29u1r"

]

const container=document.getElementById("books")

books.forEach(url=>{

const card=document.createElement("div")
card.className="book"

card.innerHTML=`

<img src="https://images.weserv.nl/?url=${encodeURIComponent(url)}&w=300&h=400&fit=cover">

<a href="${url}" target="_blank">View Book</a>

`

container.appendChild(card)

})

</script>

</body>
</html>
